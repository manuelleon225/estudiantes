<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registrar Estudiante</title>

    <!-- Vinculación del archivo CSS -->
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div class="contenedor">

    <h1>Registrar Estudiante</h1>

    <!--
        Formulario vinculado al objeto estudiante
        Permite que Thymeleaf conecte los campos automáticamente
    -->
    <form th:action="@{/estudiantes/guardar}"
          th:object="${estudiante}"
          method="post">

        <!-- ID oculto para edición -->
        <input type="hidden" th:field="*{id}" />

        <!-- ============================= -->
        <!-- NOMBRE -->
        <!-- ============================= -->
        <label>Nombres:</label>
        <input type="text" th:field="*{nombre}" />
        <div class="error"
             th:if="${#fields.hasErrors('nombre')}"
             th:errors="*{nombre}"></div>

        <!-- ============================= -->
        <!-- APELLIDO -->
        <!-- ============================= -->
        <label>Apellidos:</label>
        <input type="text" th:field="*{apellido}" />
        <div class="error"
             th:if="${#fields.hasErrors('apellido')}"
             th:errors="*{apellido}"></div>

        <!-- ============================= -->
        <!-- EMAIL -->
        <!-- ============================= -->
        <label>Email:</label>
        <input type="email" th:field="*{email}" />
        <div class="error"
             th:if="${#fields.hasErrors('email')}"
             th:errors="*{email}"></div>

        <!-- ============================= -->
        <!-- EDAD -->
        <!-- ============================= -->
        <label>Edad:</label>
        <input type="number" th:field="*{edad}" />
        <div class="error"
             th:if="${#fields.hasErrors('edad')}"
             th:errors="*{edad}"></div>

        <br>

        <button type="submit">Guardar</button>

    </form>

    <br>
    <a href="/estudiantes">Volver</a>

</div>

</body>
</html>
