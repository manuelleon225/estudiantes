<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Estudiante</title>
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>
<body>

<div class="contenedor">

    <!-- Encabezado -->
    <div class="page-header">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2z"/>
                <path d="M2 20c0-4 4.5-7 10-7s10 3 10 7"/>
            </svg>
        </div>
        <h1>Registrar Estudiante</h1>
    </div>

    <form th:action="@{/estudiantes/guardar}"
          th:object="${estudiante}"
          method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="campo">
            <label for="nombre">Nombres</label>
            <input type="text" id="nombre" th:field="*{nombre}" placeholder="Ej: Juan Carlos" />
            <div class="error"
                 th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}"></div>
        </div>

        <div class="campo">
            <label for="apellido">Apellidos</label>
            <input type="text" id="apellido" th:field="*{apellido}" placeholder="Ej: García Pérez" />
            <div class="error"
                 th:if="${#fields.hasErrors('apellido')}"
                 th:errors="*{apellido}"></div>
        </div>

        <div class="campo">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" th:field="*{email}" placeholder="ejemplo@correo.com" />
            <div class="error"
                 th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}"></div>
        </div>

        <div class="campo">
            <label for="edad">Edad</label>
            <input type="number" id="edad" th:field="*{edad}" placeholder="Ej: 20" min="1" max="99" />
            <div class="error"
                 th:if="${#fields.hasErrors('edad')}"
                 th:errors="*{edad}"></div>
        </div>

        <button type="submit">Guardar Estudiante</button>

    </form>

    <a href="/estudiantes" class="enlace-volver">Volver a la lista</a>

</div>

</body>
</html>
